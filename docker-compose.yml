version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mkarim-temu-backend
    restart: unless-stopped
    ports:
      - "${PORT_HOST:-3002}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3001}
      - DATABASE_URL=${DATABASE_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - /var/www/mkarim-temu-edition/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: mkarim-temu-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PORT=80
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: mkarim-temu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mkarim-temu-db}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mkarim-temu-db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

volumes:
  postgres_data_v2:
