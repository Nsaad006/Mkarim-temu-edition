services:
  db:
    image: postgres:15-alpine
    container_name: mkarim-db-local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=saadnadori
      - POSTGRES_PASSWORD=azerty
      - POSTGRES_DB=nadori
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U saadnadori -d nadori" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mkarim-backend-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://saadnadori:azerty@db:5432/nadori?sslmode=disable
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    container_name: mkarim-frontend-local
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3001
      - PORT=80
    depends_on:
      - backend

volumes:
  postgres_data_local:
